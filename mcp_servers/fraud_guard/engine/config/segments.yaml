# config/segments.yaml — 합성 데이터 분포 파라미터 (단일 위치)
# =============================================================================
# 합성생성(scripts/gen_synth.py)이 로드하는 유일한 분포 파라미터 원천.
# CLAUDE.md 불변원칙 3("임의값은 전부 config/로") + 5("검증 전 임의 시작값") 준수.
#
# 근거 상태 표기 — IMPLEMENTATION.md 원칙(확립된 사실 / 측정 / 임의값 구분):
#   [STAT]  실제 공식 통계로 보정한 값 (출처 명시)
#   [임의]  검증 전 임의 시작값 (학습곡선·민감도·KOSIS 추가수집으로 대체 예정)
#
# 금액 모수는 log-KRW 공간의 로그정규(loc=μ, scale=σ). 중앙값 = exp(μ).
#
# 출처:
#   - 법무부 「출입국·외국인정책 통계월보」: 체류자격·국적별 인원
#   - 한국은행 ECOS(경제통계시스템) 국제수지 이전소득 + 「외국인체류실태조사」: 송금 규모
#   - 금융감독원·경찰청 보이스피싱 피해 통계: 1인당 피해액·인출 패턴
# =============================================================================

global:
  window_days: 180            # [임의] 거래 관측 창(일)
  new_device_p_normal: 0.02   # [임의] 베르누이 — 정상 신규기기 확률
  new_device_p_anomaly: 0.70  # [임의] 참고치(시나리오에선 1로 강제)
  atm_share: 0.10             # [임의] 일상거래 중 ATM 비중

  # 거래 시각: 혼합정규(주간 집중 + 야간 꼬리)
  hour_mixture:
    p_night: 0.12             # [임의] 야간 성분 가중
    day:   {mu: 14.0, sigma: 3.0}   # [임의] 주간 N(μ,σ)
    night: {mu: 2.0,  sigma: 1.5}   # [임의] 야간 N(μ,σ)

  # 잔액 인출률: 베타(0~1 자연 제한). alpha/beta = Beta 모수.
  drawdown:
    daily:    {alpha: 2.0,  beta: 6.0}   # [임의] 일상 소액 평균 ~0.25
    big:      {alpha: 3.0,  beta: 5.0}   # [임의] 급여 송금 평균 ~0.375
    # incoming(등록금 수신=입금)은 drawdown=0 으로 처리(P2-9) → 별도 beta 불필요(제거)
    fraud:    {alpha: 45.0, beta: 2.0}   # [STAT] 사기 '일괄 고액 인출' 평균 0.957
                                         #   금감원: 악성앱 선설치로 '잔액 한도끝까지' 인출 패턴
                                         #   (팀 보정 표기 drawdown_a=45 → alpha=45)

  # 제3국 수취·의심 IP 후보 (분포변수 아님 — 선택용)
  third_countries: [HK, SG, AE, TR, TH]  # [임의] 본국·KR 아닌 제3국(계좌양도 송금처)
  suspicious_ips:  [RU, CN, NG, UA]      # [임의] 피싱 의심 접속국

  # 정상 고객 생성 구조 파라미터 (P2-8: gen_synth inline 리터럴 외부화 — 불변원칙 3 준수)
  customer:
    amount_effect_sigma: 0.22       # [임의] 고객별 소비수준 로그정규 효과 σ
    rate_effect_sigma: 0.15         # [임의] 고객별 거래빈도 로그정규 효과 σ
    active_days: [45, 120]          # [임의] 고객 관측창(입국·계좌개설 분산) 균등범위
    oversample: 1.15                # [임의] 목표 대비 풀 과표집 배수(고객 편향 완화)
    residency_offset: [60, 540]     # [임의] 정상 체류만료 잔여일(기준일 대비) 균등범위
    big_jitter_sigma: 1.0           # [임의] 정기이벤트(디랙) 주기 미세 지터 σ
    incoming_balance_frac: [0.1, 0.4]  # [임의] 입금 직전 잔액 = amount × U(범위) (P2-9)

  # 이상 시나리오 구조 파라미터 (시나리오 타입별)
  anomaly:
    fraud_drawdown_clip: [0.901, 0.999]   # [임의] 사기 인출률 베타표본 클립(꼬리 한정)
    A_takeover:
      residency_offset: [0, 10]     # [임의] 출국 임박(D-day) 균등범위
      velocity_poisson: 7           # [임의] 24h 거래수 포아송 λ
      velocity_base: 3              # [임의] velocity 가산(다회 인출 하한)
    B_phishing:
      residency_offset: [60, 540]   # [임의] 출국과 무관(정상 범위)
      velocity_poisson: 6           # [임의]
      velocity_base: 4              # [임의]

# 세그먼트 (국적 × 비자). dict 삽입 순서 = 생성 순서(시드 RNG 스트림에 영향).
segments:
  vn_e9:
    nationality: VN
    visa_type: E-9
    home_country: VN
    language: vi
    # [STAT] 법무부 통계월보: E-9(비전문취업) 약 321,000명 중 베트남 약 37,000명(최대 비중급)
    population_note: "E-9 ~321,000명 / 베트남 ~37,000명 (법무부 출입국 통계월보)"
    normal:
      daily_rate: 1.3                      # [임의] 포아송 λ (건/일)
      daily_amount: {loc: 9.62, scale: 0.55}   # [임의] 일상 소액결제 중앙값 ~15,000원
      big_event: salary_out
      big_amount: {loc: 14.5, scale: 0.35}     # [STAT] ECOS/체류실태조사: E-9 1인 정기송금
                                               #   1,500~2,500$ ≈ 200~350만원 → exp(14.5)≈198만원
      big_period_days: 30.0                # [임의] 월 급여 주기(디랙)
      big_day0: 25.0                       # [임의] 첫 급여일 offset
    anomaly:
      scenario: A_takeover                 # 출국 임박 계좌양도
      amount: {loc: 14.8, scale: 0.35}     # [임의] 양도 시 누적잔액 송금 ~268만원 (검증 전)

  np_d2:
    nationality: NP
    visa_type: D-2
    home_country: NP
    language: ne
    # [STAT] 법무부 통계월보: D-2(유학) 중 네팔 ~16,000명 돌파, 최근 최대 급증 집단
    population_note: "D-2 유학생 중 네팔 ~16,000명, 최근 최대 급증 (법무부 출입국 통계월보)"
    normal:
      daily_rate: 2.1                      # [임의] 유학생 잦은 소액
      daily_amount: {loc: 9.30, scale: 0.55}   # [임의] 중앙값 ~11,000원
      big_event: tuition_in
      big_amount: {loc: 15.07, scale: 0.25}    # [임의] 등록금 수신 중앙값 ~350만원 (KOSIS 추가수집 예정)
      big_period_days: 120.0               # [임의] 학기 주기
      big_day0: 20.0
    anomaly:
      scenario: B_phishing                 # 거래이력 없는 KR 계좌로 고액 즉시이체
      amount: {loc: 16.0, scale: 0.30}     # [STAT] 금감원: 피싱 1회 고액 ~880만원(exp(16.0));
                                           #   '다회 인출'로 누적 5,000만원+ (평균피해 2,500만→5,000만↑)
